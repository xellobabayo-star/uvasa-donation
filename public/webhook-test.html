<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVASA · Webhook Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --surface2:   #16161f;
      --border:     rgba(255,255,255,0.07);
      --socialbuzz: #8b5cf6;
      --saweria:    #ef4444;
      --bagibagi:   #10b981;
      --text:       #f1f0f5;
      --text-2:     #a09db8;
      --text-3:     #5a5775;
      --radius:     16px;
      --radius-sm:  10px;
      --radius-pill:999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px 60px;
      -webkit-font-smoothing: antialiased;
    }

    /* noise overlay */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed; inset: 0; z-index: 999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* glow */
    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      top: -30%; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(139,92,246,0.1) 0%, transparent 70%);
      z-index: 0;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* ---- HEADER ---- */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--socialbuzz);
      box-shadow: 0 0 12px var(--socialbuzz);
    }

    .logo-text { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.06em; }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--text-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .back-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.8rem; font-weight: 700;
      color: var(--text-3);
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    /* ---- PAGE TITLE ---- */
    .page-title { margin-bottom: 32px; }
    .page-title h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 6px; }
    .page-title p  { color: var(--text-3); font-size: 0.88rem; }

    /* ---- GRID ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }

    @media (max-width: 780px) { .grid { grid-template-columns: 1fr; } }

    /* ---- CARD ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    }

    .card-socialbuzz { border-top: 2px solid var(--socialbuzz); }
    .card-saweria    { border-top: 2px solid var(--saweria); }
    .card-bagibagi   { border-top: 2px solid var(--bagibagi); }

    /* ---- card head ---- */
    .card-head { display: flex; align-items: center; gap: 10px; }
    .card-icon { font-size: 1.3rem; line-height: 1; }
    .card-title { font-size: 1rem; font-weight: 800; color: var(--text); flex: 1; }

    .badge {
      font-size: 0.63rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
    }
    .badge-socialbuzz { background: rgba(139,92,246,0.15); color: #b78af7; border: 1px solid rgba(139,92,246,0.25); }
    .badge-saweria    { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .badge-bagibagi   { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }

    /* ---- endpoint box ---- */
    .endpoint-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
    }
    .ep-label {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 4px;
    }
    .ep-url {
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem; color: var(--text-2);
      word-break: break-all;
    }

    /* ---- form ---- */
    .form-body { display: flex; flex-direction: column; gap: 12px; flex: 1; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-3);
    }

    .field input,
    .field textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.86rem;
      width: 100%;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field textarea { min-height: 72px; }

    /* focus rings per platform */
    .card-socialbuzz .field input:focus,
    .card-socialbuzz .field textarea:focus {
      border-color: rgba(139,92,246,0.5);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.08);
    }
    .card-saweria .field input:focus,
    .card-saweria .field textarea:focus {
      border-color: rgba(239,68,68,0.5);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
    }
    .card-bagibagi .field input:focus,
    .card-bagibagi .field textarea:focus {
      border-color: rgba(16,185,129,0.5);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.08);
    }

    /* ---- button ---- */
    .btn {
      width: 100%; padding: 12px;
      border: none; border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 2px;
    }
    .btn:hover    { opacity: 0.86; transform: translateY(-1px); }
    .btn:active   { transform: translateY(0); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    .btn-socialbuzz { background: var(--socialbuzz); color: #fff; }
    .btn-saweria    { background: var(--saweria);    color: #fff; }
    .btn-bagibagi   { background: var(--bagibagi);   color: #fff; }

    /* ---- status ---- */
    .status { display: none; font-size: 0.8rem; padding: 9px 12px; border-radius: var(--radius-sm); line-height: 1.5; }
    .status.success { display: block; background: rgba(16,185,129,0.1);  border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
    .status.error   { display: block; background: rgba(239,68,68,0.1);   border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }

    /* ---- bottom links ---- */
    .bottom-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

    .bottom-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; font-weight: 700;
      color: var(--text-2); text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      transition: color 0.2s, border-color 0.2s;
    }
    .bottom-link:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="page-header">
    <div class="header-left">
      <span class="logo-dot"></span>
      <span class="logo-text">UVASA</span>
      <span class="logo-sub">webhook tester</span>
    </div>
    <a href="/" class="back-link">← Dashboard</a>
  </div>

  <!-- TITLE -->
  <div class="page-title">
    <h1>🧪 Webhook Tester</h1>
    <p>Simulasi donasi masuk dari SocialBuzz, Saweria, dan BagiBagi</p>
  </div>

  <!-- 3 CARDS -->
  <div class="grid">

    <!-- SOCIALBUZZ -->
    <div class="card card-socialbuzz">
      <div class="card-head">
        <span class="card-icon">⚡</span>
        <span class="card-title">SocialBuzz</span>
        <span class="badge badge-socialbuzz">POST</span>
      </div>

      <div class="endpoint-box">
        <div class="ep-label">Endpoint</div>
        <div class="ep-url" id="urlSocialbuzz">/webhook/socialbuzz</div>
      </div>

      <form class="form-body" onsubmit="testSocialbuzz(event)">
        <div class="field">
          <label>Nama Supporter</label>
          <input type="text" name="supporter" value="TestUser123" required />
        </div>
        <div class="field">
          <label>Jumlah (Rp)</label>
          <input type="number" name="amount" value="50000" min="1" required />
        </div>
        <div class="field">
          <label>Pesan</label>
          <textarea name="message">Halo dari SocialBuzz! ⚡</textarea>
        </div>
        <button type="submit" class="btn btn-socialbuzz">🚀 Test SocialBuzz</button>
        <div class="status" id="statusSocialbuzz"></div>
      </form>
    </div>

    <!-- SAWERIA -->
    <div class="card card-saweria">
      <div class="card-head">
        <span class="card-icon">💸</span>
        <span class="card-title">Saweria</span>
        <span class="badge badge-saweria">POST</span>
      </div>

      <div class="endpoint-box">
        <div class="ep-label">Endpoint</div>
        <div class="ep-url" id="urlSaweria">/webhook/saweria</div>
      </div>

      <form class="form-body" onsubmit="testSaweria(event)">
        <div class="field">
          <label>Nama Donatur</label>
          <input type="text" name="donator_name" value="TestDonor Saweria" required />
        </div>
        <div class="field">
          <label>Jumlah (Rp)</label>
          <input type="number" name="amount_raw" value="75000" min="1" required />
        </div>
        <div class="field">
          <label>Pesan</label>
          <textarea name="message">Halo dari Saweria! 💸</textarea>
        </div>
        <button type="submit" class="btn btn-saweria">🚀 Test Saweria</button>
        <div class="status" id="statusSaweria"></div>
      </form>
    </div>

    <!-- BAGIBAGI -->
    <div class="card card-bagibagi">
      <div class="card-head">
        <span class="card-icon">🎁</span>
        <span class="card-title">BagiBagi</span>
        <span class="badge badge-bagibagi">POST</span>
      </div>

      <div class="endpoint-box">
        <div class="ep-label">Endpoint</div>
        <div class="ep-url" id="urlBagibagi">/webhook/bagibagi</div>
      </div>

      <form class="form-body" onsubmit="testBagibagi(event)">
        <div class="field">
          <label>Nama Donatur</label>
          <input type="text" name="name" value="TestDonor BagiBagi" required />
        </div>
        <div class="field">
          <label>Jumlah (Rp)</label>
          <input type="number" name="amount" value="100000" min="1" required />
        </div>
        <div class="field">
          <label>Pesan</label>
          <textarea name="message">Halo dari BagiBagi! 🎁</textarea>
        </div>
        <button type="submit" class="btn btn-bagibagi">🚀 Test BagiBagi</button>
        <div class="status" id="statusBagibagi"></div>
      </form>
    </div>

  </div><!-- /grid -->

  <!-- BOTTOM LINKS -->
  <div class="bottom-links">
    <a href="/" class="bottom-link">📊 Dashboard</a>
    <a href="/data" class="bottom-link" target="_blank">📦 Raw /data</a>
  </div>

</div><!-- /wrap -->

<script>
  // update full URLs
  window.addEventListener('load', () => {
    const base = window.location.origin;
    document.getElementById('urlSocialbuzz').textContent = base + '/webhook/socialbuzz';
    document.getElementById('urlSaweria').textContent    = base + '/webhook/saweria';
    document.getElementById('urlBagibagi').textContent   = base + '/webhook/bagibagi';
  });

  // generic fetch helper
  async function send(endpoint, payload, statusId, btn) {
    const el = document.getElementById(statusId);
    el.className = 'status';
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = '⏳ Mengirim...';

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (res.ok) {
        el.className = 'status success';
        el.textContent = '✅ Berhasil! Cek dashboard untuk melihat donasi masuk.';
      } else {
        const txt = await res.text();
        el.className = 'status error';
        el.textContent = `❌ Error ${res.status}: ${txt}`;
      }
    } catch (err) {
      el.className = 'status error';
      el.textContent = '❌ Gagal terhubung: ' + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  }

  // SocialBuzz — field: supporter, amount, message
  function testSocialbuzz(e) {
    e.preventDefault();
    const f = e.target;
    send('/webhook/socialbuzz', {
      supporter: f.supporter.value,
      amount:    parseInt(f.amount.value),
      message:   f.message.value,
    }, 'statusSocialbuzz', f.querySelector('button'));
  }

  // Saweria — field: donator_name, amount_raw, message
  function testSaweria(e) {
    e.preventDefault();
    const f = e.target;
    send('/webhook/saweria', {
      donator_name: f.donator_name.value,
      amount_raw:   parseInt(f.amount_raw.value),
      message:      f.message.value,
    }, 'statusSaweria', f.querySelector('button'));
  }

  // BagiBagi — field: name, amount, message
  function testBagibagi(e) {
    e.preventDefault();
    const f = e.target;
    send('/webhook/bagibagi', {
      name:    f.name.value,
      amount:  parseInt(f.amount.value),
      message: f.message.value,
    }, 'statusBagibagi', f.querySelector('button'));
  }
</script>
</body>
</html>
